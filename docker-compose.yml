services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lumenflow_postgres
    restart: always
    environment:
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen_pass
      POSTGRES_DB: lumenflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lumenflow_pgadmin
    profiles: [ "admin" ]
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
