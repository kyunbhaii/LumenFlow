version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16

    container_name: lumenflow_postgres

    restart: always

    environment:
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen_pass
      POSTGRES_DB: lumenflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
